title: EGB202
description: Microprocessors and Digital Systems
url: https://egb202.github.io

theme: just-the-docs
color_scheme: light

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

latex: katex

compress_html:
  blanklines: true

markdown: kramdown
kramdown:
  syntax_highlighter: none

# Color scheme currently only supports "dark", "light"/nil (default), or a custom scheme that you define
color_scheme: nil

# When commented out, callouts_level defaults to quiet for the light scheme, and loud for dark
# callouts_level: quiet # or loud
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

nav_external_links:
  - title: QUTy Schematic
    url: /assets/QUTy-V01_Schematic.pdf
  - title: ATtiny1626 Datasheet
    url: https://ww1.microchip.com/downloads/aemDocuments/documents/MCU08/ProductDocuments/DataSheets/ATtiny1624-26-27-DataSheet-DS40002234B.pdf
  - title: AVR Instruction Set Manual
    url: https://ww1.microchip.com/downloads/en/DeviceDoc/AVR-InstructionSet-Manual-DS40002198.pdf

exclude:
  - _ts
  - node_modules
  - package.json
  - package-lock.json
  - tsconfig.json
  - .prettierrc.json

footer_content: "This work is licensed under a <a href=\"https://creativecommons.org/licenses/by-nd/4.0/\">Attribution-NoDerivatives 4.0 International License</a>. Made by Tarang Janawalkar."

aux_links:
  "QUT Canvas":
    - "https://canvas.qut.edu.au"
