<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lorenz System | EGB202</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap");

      html {
        font-size: 17px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        overflow: hidden;
        font-family: "Inter", sans-serif;
        color: #fff;
        user-select: none;
      }

      canvas {
        display: block;
      }

      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 10;
      }

      /* Vignette */
      #overlay::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
          ellipse at center,
          transparent 50%,
          rgba(0, 0, 0, 0.6) 100%
        );
      }

      /* Scanlines */
      #overlay::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.03) 2px,
          rgba(0, 0, 0, 0.03) 4px
        );
      }

      #title {
        position: fixed;
        top: 1.5rem;
        left: 1.5rem;
        z-index: 20;
        pointer-events: none;
      }

      #title h1 {
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.85);
        margin-bottom: 0.25rem;
      }

      #title p {
        font-size: 0.8rem;
        font-weight: 300;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.45);
      }

      #params {
        position: fixed;
        bottom: 1.5rem;
        left: 1.5rem;
        z-index: 20;
        font-size: 0.875rem;
        font-weight: 300;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.7);
        line-height: 2;
      }

      #params .section-label {
        color: rgba(255, 255, 255, 0.4);
        text-transform: uppercase;
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        margin-top: 0.625rem;
        margin-bottom: 0.125rem;
      }

      #params .section-label:first-child {
        margin-top: 0;
      }

      .param-row {
        display: flex;
        align-items: center;
        gap: 0;
        height: 1.375rem;
      }

      .param-name {
        color: rgba(255, 255, 255, 0.8);
        font-weight: 400;
        width: 1.375rem;
        text-align: right;
        margin-right: 0.375rem;
        flex-shrink: 0;
      }

      .param-val {
        color: rgba(255, 255, 255, 0.85);
        font-weight: 400;
        min-width: 3.5rem;
        text-align: right;
        cursor: ns-resize;
        padding: 0 0.25rem;
        border-radius: 0.125rem;
        transition:
          background 0.15s,
          color 0.15s;
        font-variant-numeric: tabular-nums;
        outline: none;
      }

      .param-val:hover {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 1);
      }

      .param-val:focus {
        cursor: text;
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 1);
        outline: 1px solid rgba(255, 255, 255, 0.3);
      }

      .param-arrows {
        display: flex;
        flex-direction: column;
        margin-left: 0.125rem;
        gap: 0;
        opacity: 0;
        transition: opacity 0.15s;
      }

      .param-row:hover .param-arrows {
        opacity: 1;
      }

      .param-arrows button {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.5rem;
        cursor: pointer;
        padding: 0 0.2rem;
        line-height: 0.7rem;
        font-family: inherit;
        transition: color 0.1s;
      }

      .param-arrows button:hover {
        color: rgba(255, 255, 255, 1);
      }

      #step-counter {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        z-index: 20;
        font-size: 0.8rem;
        font-weight: 300;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.4);
        pointer-events: none;
        font-variant-numeric: tabular-nums;
        text-align: right;
      }

      #controls {
        position: fixed;
        bottom: 3.25rem;
        right: 1.5rem;
        z-index: 20;
        display: flex;
        flex-direction: column;
        gap: 0.375rem;
        align-items: stretch;
        width: 6.25rem;
      }

      .ctrl-btn {
        background: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.6);
        font-family: "Inter", sans-serif;
        font-size: 0.75rem;
        font-weight: 400;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.375em 0.625em;
        border-radius: 0.2rem;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .ctrl-btn:hover {
        border-color: rgba(255, 255, 255, 0.5);
        color: rgba(255, 255, 255, 1);
        background: rgba(255, 255, 255, 0.06);
      }

      .ctrl-btn .hint {
        color: rgba(255, 255, 255, 0.3);
        font-size: 0.75em;
      }

      .ctrl-btn.hidden {
        display: none;
      }

      #pause-indicator {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 1.125rem;
        font-weight: 500;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0);
        pointer-events: none;
        z-index: 30;
        transition: color 0.3s;
      }

      #pause-indicator.visible {
        color: rgba(255, 255, 255, 0.8);
      }

      #toast {
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%) translateY(0.5rem);
        background: rgba(30, 30, 40, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: rgba(255, 255, 255, 0.85);
        font-size: 0.8rem;
        font-weight: 400;
        letter-spacing: 0.06em;
        padding: 0.5em 1em;
        border-radius: 0.35rem;
        pointer-events: none;
        z-index: 50;
        opacity: 0;
        transition:
          opacity 0.25s,
          transform 0.25s;
      }

      #toast.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      #reset-btn {
        margin-top: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div id="overlay"></div>

    <div id="title">
      <h1>Lorenz System</h1>
      <p>EGB202 Tutorial 6</p>
    </div>

    <div id="params"></div>
    <div id="controls"></div>
    <div id="step-counter"></div>
    <div id="pause-indicator">Paused</div>
    <div id="toast"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
          "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
        }
      }
    </script>

    <script type="module" src="/assets/js/lorenz.js"></script>
  </body>
</html>
